    <script>
        $(document).ready(function () {
       (function applyRolePermissions() {
        const role = sessionStorage.getItem("userRole");
        const city = sessionStorage.getItem("selectedCity");
     // const token = sessionStorage.getItem("authToken"); -->

        // Check authentication - redirect if not authenticated
        if (!token || !role) {
            window.location.href = "/login/Login2.html"; // Fixed path
            return;
        }

        // Handle USER role (city users) - CHANGED FROM "CITY" to "USER"
        if (role === "USER") {
            // Lock dropdown
            const dropdown = document.getElementById("nagarNigamSelect");
            if (dropdown && city) {
                dropdown.value = city.toLowerCase(); // Ensure lowercase for matching
                dropdown.disabled = true;
                dropdown.style.backgroundColor = "#f5f5f5";
                dropdown.style.cursor = "not-allowed";
                dropdown.style.color = "#666";
                dropdown.style.opacity = "0.7";
                
                console.log("City user - Auto-selected city:", city);
                
                // Trigger change event to load city-specific data
                setTimeout(() => {
                    const event = new Event("change", { bubbles: true });
                    dropdown.dispatchEvent(event);
                }, 500);
            }
            
            // Hide progress report for city users
            const progressButton = document.getElementById("progress1");
            if (progressButton) {
                progressButton.style.display = "none";
            }
        }

        // Handle ADMIN role - FIXED spelling
        if (role === "ADMIN") {
            console.log("Admin: full access enabled");
          
        }
    })();
    
    // Initially only map visible
    $("#progress_graph").hide();
    $("#map").show();

    // Toggle map/report
    $("#progress1").click(function () {
        $("#map").toggle();
        $("#progress_graph").toggle();
    });

    // Logout button
    $("#logoutButton").click(function () {
        if (confirm("Are you sure you want to logout?")) {
            if (window.UridaAuth && typeof window.UridaAuth.logout === 'function') {
                window.UridaAuth.logout();
            } else {
                // Fallback logout
                sessionStorage.clear();
                window.location.href = '/login/Login2.html'; // Fixed path
            }
        }
    });

});

// ----------------------- AUTO LOGOUT ON INACTIVITY -------------------------
  let inactivityTime = function () {
    let timer;
    const logoutAfter = 15 * 60 * 1000; // 15 minutes

    function resetTimer() {
      clearTimeout(timer);
      timer = setTimeout(logoutUser, logoutAfter);
    }

    function logoutUser() {
      alert("Session expired due to inactivity. Please log in again.");
      sessionStorage.clear();
      window.location.href = '/login/Login2.html';
    }

    // Reset timer on user activity
    window.onload = resetTimer;
    document.onmousemove = resetTimer;
    document.onkeypress = resetTimer;
    document.onclick = resetTimer;
    document.onscroll = resetTimer;
  };

  inactivityTime();

    </script>
